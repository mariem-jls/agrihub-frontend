<div class="seller-app" [class.collapsed]="sidebarCollapsed">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- Header avec logo + toggle -->
    <div class="sidebar-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span class="logo-text" *ngIf="!sidebarCollapsed">AgriHub</span>
      </div>
      <button class="toggle-btn" type="button" (click)="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6" *ngIf="!sidebarCollapsed"/>
          <path d="M9 18l6-6-6-6" *ngIf="sidebarCollapsed"/>
        </svg>
      </button>
    </div>

    <!-- Badge -->
    <div class="seller-badge" *ngIf="!sidebarCollapsed">
      <span class="badge-text">Backoffice</span>
    </div>
    <div class="seller-badge-compact" *ngIf="sidebarCollapsed">
      <span class="badge-icon">🌿</span>
    </div>

    <!-- Navigation -->
    <nav class="nav-menu">
      <a
        routerLink="/event"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1"></rect>
        </svg>
        <span class="nav-text" *ngIf="!sidebarCollapsed">Événements</span>
      </a>

      <a routerLink="/event/add" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7h-4.18A3 3 0 0 0 16 5.18V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v1.18A3 3 0 0 0 8.18 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
          <line x1="12" y1="12" x2="12" y2="16"></line>
          <line x1="9" y1="14" x2="12" y2="12"></line>
          <line x1="15" y1="15" x2="12" y2="12"></line>
        </svg>
        <span class="nav-text" *ngIf="!sidebarCollapsed">Ajouter</span>
      </a>

      <a routerLink="participations" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span class="nav-text" *ngIf="!sidebarCollapsed">Participations</span>
      </a>

      <a routerLink="archives" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7h-4.18A3 3 0 0 0 16 5.18V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v1.18A3 3 0 0 0 8.18 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
          <path d="M12 11v6"></path>
          <path d="M9 14h6"></path>
        </svg>
        <span class="nav-text" *ngIf="!sidebarCollapsed">Archives</span>
      </a>
    </nav>

    <!-- Profil (statique pour l'instant) -->
    <div class="seller-footer">
      <div class="profile-card" [class.compact]="sidebarCollapsed">
        <div class="avatar">
          <div class="avatar-initials">A</div>
        </div>

        <div class="profile-info" *ngIf="!sidebarCollapsed">
          <h4>Admin</h4>
          <p>AgriHub</p>
          <span class="location">Gestion</span>
        </div>

        <button class="logout-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span *ngIf="!sidebarCollapsed">Logout</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
