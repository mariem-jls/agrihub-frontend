<div class="image-upload-section">

  <div class="section-header">
    <h3>Product Images</h3>
    <span class="image-count">{{ images.length }} / 5 images</span>
  </div>

  <div *ngIf="message" [class]="'alert alert-' + messageType">
    {{ message }}
  </div>

  <!-- IMAGES GRID -->
  <div class="images-grid" *ngIf="images.length > 0">
    <div class="image-item"
         *ngFor="let img of images"
         [class.primary]="img.isPrimary">

      <div class="image-preview">
        <img [src]="getImageUrl(img.imageUrl)" alt="Product image"/>
        <div class="image-overlay">
          <button class="overlay-btn btn-primary-img"
                  *ngIf="!img.isPrimary"
                  (click)="setPrimary(img)"
                  title="Set as primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span>Primary</span>
          </button>
          <button class="overlay-btn btn-delete-img"
                  (click)="deleteImage(img.id!)"
                  title="Delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="primary-badge" *ngIf="img.isPrimary">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        Primary
      </div>
    </div>

    <!-- ADD MORE SLOT -->
    <div class="add-more-slot"
         *ngIf="images.length < 5"
         (click)="fileInput.click()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <p>Add image</p>
    </div>
  </div>

  <!-- DROP ZONE (quand aucune image) -->
  <div class="drop-zone"
       *ngIf="images.length === 0"
       [class.drag-over]="dragOver"
       [class.uploading]="uploading"
       (dragover)="onDragOver($event)"
       (dragleave)="onDragLeave()"
       (drop)="onDrop($event)"
       (click)="fileInput.click()">

    <div *ngIf="!uploading">
      <svg class="drop-icon-svg" width="48" height="48" viewBox="0 0 24 24"
           fill="none" stroke="#2C5F2D" stroke-width="1.2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <h4>Drag and drop your image here</h4>
      <p>or <span class="browse-link">browse files</span></p>
      <p class="drop-hint">JPG, PNG, WEBP — max 5MB</p>
    </div>

    <div *ngIf="uploading" class="uploading-state">
      <div class="spinner"></div>
      <p>Uploading...</p>
    </div>
  </div>

  <!-- UPLOAD BUTTON (quand des images existent) -->
  <button class="btn-upload"
          *ngIf="images.length > 0 && images.length < 5 && !uploading"
          (click)="fileInput.click()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Add Another Image
  </button>

  <div class="upload-progress" *ngIf="uploading && images.length > 0">
    <div class="spinner-small"></div>
    <span>Uploading...</span>
  </div>

  <input #fileInput type="file" accept="image/*"
         style="display:none"
         (change)="onFileSelected($event)"/>

</div>
