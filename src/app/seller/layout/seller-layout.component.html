<div class="seller-app" [class.collapsed]="sidebarCollapsed">
  
  <!-- SIDEBAR -->
  <aside class="sidebar">
    
    <!-- Header avec logo + toggle -->
    <div class="sidebar-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span class="logo-text" *ngIf="!sidebarCollapsed">AgriHub</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6" *ngIf="!sidebarCollapsed"/>
          <path d="M9 18l6-6-6-6" *ngIf="sidebarCollapsed"/>
        </svg>
      </button>
    </div>

    <!-- Badge seller (version compacte ou complète) -->
    <div class="seller-badge" *ngIf="!sidebarCollapsed">
      <span class="badge-text">Seller Dashboard</span>
    </div>
    <div class="seller-badge-compact" *ngIf="sidebarCollapsed">
      <span class="badge-icon">🏪</span>
    </div>

    <!-- Navigation -->
    <nav class="nav-menu">
      <a routerLink="dashboard" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1"></rect>
        </svg>
        <span class="nav-text" *ngIf="!sidebarCollapsed">Dashboard</span>
      </a>

      <a routerLink="products" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7h-4.18A3 3 0 0 0 16 5.18V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v1.18A3 3 0 0 0 8.18 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
          <line x1="12" y1="12" x2="12" y2="16"></line>
          <line x1="9" y1="15" x2="12" y2="12"></line>
          <line x1="15" y1="15" x2="12" y2="12"></line>
        </svg>
        <span class="nav-text" *ngIf="!sidebarCollapsed">My Products</span>
      </a>

      <a routerLink="orders" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="nav-text" *ngIf="!sidebarCollapsed">My Orders</span>
        <span class="badge-pending" *ngIf="pendingCount > 0">{{ pendingCount }}</span>
      </a>

      <a routerLink="categories" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
          <line x1="7" y1="7" x2="7.01" y2="7"></line>
        </svg>
        <span class="nav-text" *ngIf="!sidebarCollapsed">Categories</span>
      </a>

      <a routerLink="settings" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62l.04-.04z"></path>
        </svg>
        <span class="nav-text" *ngIf="!sidebarCollapsed">Settings</span>
      </a>
    </nav>

    <!-- Profil vendeur en bas -->
    <div class="seller-footer">
      <div class="profile-card" [class.compact]="sidebarCollapsed">
        <div class="avatar">
          <ng-container *ngIf="seller.avatar; else initialsAvatar">
            <img [src]="seller.avatar" alt="avatar">
          </ng-container>
          <ng-template #initialsAvatar>
            <div class="avatar-initials">{{ getInitials() }}</div>
          </ng-template>
        </div>
        
        <div class="profile-info" *ngIf="!sidebarCollapsed">
          <h4>{{ seller.name }}</h4>
          <p>{{ seller.farmName }}</p>
          <span class="location">{{ seller.region }}</span>
        </div>
        
        <button class="logout-btn" (click)="logout()" [title]="sidebarCollapsed ? 'Logout' : ''">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span *ngIf="!sidebarCollapsed">Logout</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
